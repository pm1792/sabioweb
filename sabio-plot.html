<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabio Plot — Sabio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --orange: #e85d26; --dark: #111; --soft: #888; --bg: #fafaf8; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 40px 24px; }
  .back { position: fixed; top: 24px; left: 24px; text-decoration: none; color: var(--soft); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back:hover { color: var(--orange); }
  .icon { font-size: 4rem; margin-bottom: 1.5rem; }
  .tag { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; line-height: 1.1; margin-bottom: 16px; }
  h1 em { font-style: italic; color: var(--orange); }
  p { font-size: 1.05rem; color: var(--soft); line-height: 1.7; max-width: 480px; margin: 0 auto 2.5rem; }
  .badge { display: inline-block; background: #111; color: white; font-size: 13px; font-weight: 600; padding: 10px 28px; border-radius: 100px; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <a href="index.html" class="back">← Back to Sabio</a>
  <div>
    <div class="icon">✍️</div>
    <div class="tag">Coming Soon</div>
    <h1>Sabio<br/><em>Plot</em></h1>
    <p>Build stories beat by beat — setup, conflict, twist, resolution. Real-time coaching on structure, tension, and character. Learn the craft of storytelling by actually doing it, not just reading about it.</p>
    <span class="badge">Launching Soon 🚀</span>
  </div>
</body>
</html>
